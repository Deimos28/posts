name: Publish essays
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Install check deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q enchant-2 hunspell-en-us
          pip install --quiet pyenchant requests google-genai
      - name: Deterministic checks (spell, URLs, style) — gating
        run: python3 site/checks.py
      - name: LLM claim check — gating, retry if it did not run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Exit codes from llm_check.py:
          #   0 = pass, 1 = content FAIL (gate, do NOT retry), 2 = did-not-run (retry)
          for attempt in 1 2 3; do
            set +e
            python3 site/llm_check.py
            code=$?
            set -e
            if [ "$code" -eq 0 ]; then
              echo "LLM check passed (attempt $attempt)."; exit 0
            elif [ "$code" -eq 1 ]; then
              echo "LLM check FAILED on content; gating."; exit 1
            else
              echo "LLM check did not run (attempt $attempt, code $code); retrying in $((attempt*15))s."
              sleep $((attempt*15))
            fi
          done
          echo "LLM check could not run after retries; failing the gate to be safe."
          exit 1

  risk-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Install deps
        run: pip install --quiet google-genai
      - name: Advisory publishing-risk review (never gates)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BEFORE_SHA: ${{ github.event.before }}
        run: python3 site/risk_review.py

  build:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pandoc
        run: sudo apt-get update -q && sudo apt-get install -y -q pandoc
      - name: Build site
        run: python3 site/build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
