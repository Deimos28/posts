name: Publish essays
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install check deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q enchant-2 hunspell-en-us
          pip install --quiet pyenchant requests google-generativeai
      - name: Deterministic checks (spell, URLs, style) — gating
        run: python3 site/checks.py
      - name: LLM claim check — gating
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 site/llm_check.py

  build:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pandoc
        run: sudo apt-get update -q && sudo apt-get install -y -q pandoc
      - name: Build site
        run: python3 site/build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
