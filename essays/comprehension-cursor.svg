<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="background: white; font-family: sans-serif;">
  <!-- Boxes -->
  <rect x="100" y="50" width="160" height="60" rx="5" ry="5" stroke="black" fill="none" />
  <text x="180" y="85" text-anchor="middle" font-size="14">Comprehension</text>

  <rect x="100" y="150" width="160" height="60" rx="5" ry="5" stroke="black" fill="none" />
  <text x="180" y="185" text-anchor="middle" font-size="14">Judgement</text>

  <rect x="320" y="50" width="160" height="60" rx="5" ry="5" stroke="black" fill="none" />
  <text x="400" y="85" text-anchor="middle" font-size="14">Friction</text>

  <rect x="320" y="150" width="160" height="60" rx="5" ry="5" stroke="black" fill="none" />
  <text x="400" y="185" text-anchor="middle" font-size="14">Manual coding</text>

  <rect x="540" y="150" width="160" height="60" rx="5" ry="5" stroke="black" fill="none" />
  <text x="620" y="185" text-anchor="middle" font-size="14">Agent</text>

  <rect x="320" y="250" width="160" height="60" rx="5" ry="5" stroke="black" fill="none" />
  <text x="400" y="285" text-anchor="middle" font-size="14">Code or prompt?</text>

  <!-- Arrows -->
  <path d="M 180 110 V 150" stroke="black" fill="none" marker-end="url(#arrowhead)" />
  <text x="160" y="130" font-size="12" fill="black">rated mental model</text>

  <path d="M 260 85 H 320" stroke="black" fill="none" marker-end="url(#arrowhead)" />
  <text x="290" y="75" font-size="12" fill="black">γ</text>

  <path d="M 400 110 V 150" stroke="black" fill="none" marker-end="url(#arrowhead)" />
  <text x="420" y="130" font-size="12" fill="black">errors</text>

  <path d="M 400 210 V 250" stroke="black" fill="none" marker-end="url(#arrowhead)" />
  <text x="420" y="230" font-size="12" fill="black">code</text>

  <path d="M 480 185 H 540" stroke="black" fill="none" marker-end="url(#arrowhead)" />
  <text x="510" y="175" font-size="12" fill="black">code</text>

  <!-- Fixed intent wire (straight vertical) -->
  <path d="M 400 250 V 285" stroke="black" fill="none" marker-end="url(#arrowhead)" />
  <text x="380" y="270" font-size="12" fill="black">intent</text>

  <path d="M 480 185 V 250 H 480" stroke="black" fill="none" marker-end="url(#arrowhead)" />
  <text x="500" y="220" font-size="12" fill="black">intent</text>

  <path d="M 180 210 V 250 H 320" stroke="black" fill="none" marker-end="url(#arrowhead)" />
  <text x="250" y="240" font-size="12" fill="black">test</text>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>
</svg>